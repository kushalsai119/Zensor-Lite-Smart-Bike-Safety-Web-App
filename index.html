<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zensor Lite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

    <h1>Zensor Lite 🚦</h1>
    <p class="subtitle">Smart Bike Safety Monitoring System</p>

    <div class="card">

        <label>Enter Speed (km/h)</label>
        <input type="number" id="speed" placeholder="e.g. 60">

        <div class="buttons">
            <button onclick="checkSpeed()">Check Speed</button>
            <button onclick="fatigueAlert()">Fatigue Alert</button>
            <button onclick="getWeather()">Weather</button>
        </div>

        <div id="alerts"></div>


    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>

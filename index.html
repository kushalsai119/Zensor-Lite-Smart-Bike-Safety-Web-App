<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zensor Lite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Zensor Lite - Bike Safety System</h1>

<div class="container">

    <label>Enter Speed (km/h):</label>
    <input type="number" id="speed" placeholder="Enter speed">

    <br><br>

    <button onclick="checkSpeed()">Check Speed</button>
    <button onclick="fatigueAlert()">I feel sleepy</button>
    <button onclick="getWeather()">Check Weather</button>

    <div id="alerts"></div>

    <br><br>

    <canvas id="speedChart"></canvas>

</div>

<!-- Load Chart.js FIRST -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Then your JS -->
<script src="script.js"></script>

</body>
</html>

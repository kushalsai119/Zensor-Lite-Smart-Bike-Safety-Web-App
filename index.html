<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zensor Lite - JARVIS UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hud">

    <h1>ZENSOR LITE</h1>
    <p class="sub">JARVIS BIKE SAFETY SYSTEM</p>

    <div class="panel">

        <input type="number" id="speed" placeholder="ENTER SPEED">

        <div class="buttons">
            <button onclick="checkSpeed()">CHECK SPEED</button>
            <button onclick="fatigueAlert()">FATIGUE</button>
            <button onclick="getWeather()">WEATHER</button>
        </div>

        <div id="alerts"></div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
